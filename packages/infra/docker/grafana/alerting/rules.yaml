apiVersion: 1

# Provisioned alert rules. Each rule: A = data query, C = threshold expression
# (condition). They show in Grafana -> Alerting; wire a contact point + notification
# policy (Slack/Telegram) to actually get pinged (see MONITORING.md).
groups:
  - orgId: 1
    name: backend-slo
    folder: trelloclone
    interval: 1m
    rules:
      - uid: backend-down
        title: Backend down (no /metrics scrape)
        condition: C
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "Backend is not being scraped (likely down) for >1m."
        noDataState: NoData
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              datasource: { type: prometheus, uid: prometheus }
              expr: 'up{job="backend"}'
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              conditions:
                - evaluator: { type: lt, params: [1] }

      - uid: backend-5xx-rate
        title: Backend 5xx error rate > 5%
        condition: C
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "5xx error rate over 5% for 5m."
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              datasource: { type: prometheus, uid: prometheus }
              expr: '100 * sum(rate(http_request_duration_seconds_count{status=~"5.."}[5m])) / clamp_min(sum(rate(http_request_duration_seconds_count[5m])), 1)'
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              conditions:
                - evaluator: { type: gt, params: [5] }

      - uid: backend-p95-latency
        title: Backend p95 latency > 1s
        condition: C
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "p95 request latency above 1s for 10m."
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              datasource: { type: prometheus, uid: prometheus }
              expr: 'histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))'
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              conditions:
                - evaluator: { type: gt, params: [1] }

  - orgId: 1
    name: backend-logs
    folder: trelloclone
    interval: 1m
    rules:
      - uid: backend-error-logs
        title: Backend error logs > 10/min
        condition: C
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "More than 10 error/fatal log lines per minute for 5m."
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: loki
            model:
              refId: A
              datasource: { type: loki, uid: loki }
              expr: 'sum(count_over_time({service="backend"} | json | level >= 50 [1m]))'
              queryType: instant
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              conditions:
                - evaluator: { type: gt, params: [10] }
