# This file lives at packages/infra/docker/. Build context = repo root
# (../../..) so builds see the whole pnpm workspace; .dockerignore at repo root.
#
# ONE compose for BOTH tiers (stage + prod) — each tier is its own VPS. Every
# difference between the tiers arrives via the environment of the GitHub
# Actions job, written to /opt/trello/.env on the box (see
# .github/workflows/deploy-stage.yml and deploy-prod.yml):
#   REGISTRY       Docker Hub namespace -> image names
#   IMAGE_TAG      git tag being deployed (vX.Y.Z-rc.N on stage, vX.Y.Z on prod)
#   APP_ENV        stage | prod (backend VPS_ENV knob + log labels)
#   DOMAIN         registrable domain — the ONLY source every host is derived
#                  from; NEVER hardcoded in the repo (GitHub Actions variable)
#   HOST_PREFIX    subdomain prefix: "stage-" on stage, "" on prod
#                  (stage-app.${DOMAIN} vs app.${DOMAIN}, ...)
#   SITE_URL       public landing origin (stage.${DOMAIN} vs apex — not
#                  prefix-derivable, so it is passed whole)
# Images are byte-identical on every tier — NO domain/tier baked at build. The
# SPA reads /config.js at runtime; the landing reads process.env at runtime.
#
# Every custom service has both `image:` + `build:`:
#   - `docker compose build` -> builds & tags with the `image:` value
#   - `docker compose push`  -> pushes to Docker Hub
#   - `docker compose up`    -> runs the already-pulled image (no rebuild)
# Observability services are stock images.
#
# The shared proxy is Traefik (external network 'edge'): it terminates TLS and
# routes every *.${DOMAIN} Host to the nginx service. NOTHING here publishes a
# host port — the VPS is shared with other apps and only Traefik owns 80/443.

name: trello

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    labels:
      com.project.service: postgres
      com.project.env: ${APP_ENV}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    labels:
      com.project.service: redis
      com.project.env: ${APP_ENV}
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]

  # RedisInsight UI (:5540). No auth of its own -> admin-gated by the same SSO
  # forward-auth as Grafana/MinIO (see nginx template). Pre-accepts the EULA and
  # auto-adds the local redis connection.
  redisinsight:
    image: redis/redisinsight:latest
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      RI_APP_HOST: 0.0.0.0
      RI_APP_PORT: '5540'
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: '6379'
      RI_REDIS_ALIAS: trello
    volumes:
      - redisinsightdata:/data
    labels:
      com.project.service: redisinsight
      com.project.env: ${APP_ENV}
    networks: [internal]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      # Console served behind nginx at the minio subdomain (TLS at Traefik).
      MINIO_BROWSER_REDIRECT_URL: https://${HOST_PREFIX}minio.${DOMAIN}
    volumes:
      - miniodata:/data
    labels:
      com.project.service: minio
      com.project.env: ${APP_ENV}
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  # One-shot: create the Loki + Tempo buckets, then exit.
  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set m http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      mc mb -p m/loki-data m/tempo-data; exit 0"
    networks: [internal]

  backend:
    image: ${REGISTRY}/trello-backend:${IMAGE_TAG}
    build:
      context: ../../..
      dockerfile: packages/infra/docker/Dockerfile.backend
      args:
        SENTRY_RELEASE: ${SENTRY_RELEASE:-dev}
      secrets:
        - sentry_auth_token
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Single tier knob; NODE_ENV is derived from it in tracing.ts.
      VPS_ENV: ${APP_ENV}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      # SPA and API are same-origin (nginx proxies /trpc + /api on the app
      # host); the api.* host is kept for swagger/direct REST, so credentialed
      # CORS still allows the app origin.
      CORS_ORIGINS: https://${HOST_PREFIX}app.${DOMAIN}
      # Bootstrap super admin, seeded on startup (idempotent; also the SSO
      # gate's first admitted identity).
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
      # Mail transport. Empty MAIL_USER/PASS -> app emails silently not sent.
      MAIL_HOST: ${MAIL_HOST:-sandbox.smtp.mailtrap.io}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-dev}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      # Backup: staging dir + optional Drive OAuth + optional MinIO mirror.
      # The Drive callback runs on the app host (nginx proxies /api there);
      # the URI must be registered in the Google console.
      BACKUP_WORK_DIR: /var/backups/work
      BACKUP_ENCRYPTION_PASSPHRASE: ${BACKUP_ENCRYPTION_PASSPHRASE:-}
      GDRIVE_CLIENT_ID: ${GDRIVE_CLIENT_ID:-}
      GDRIVE_CLIENT_SECRET: ${GDRIVE_CLIENT_SECRET:-}
      GDRIVE_REDIRECT_URI: https://${HOST_PREFIX}app.${DOMAIN}/api/admin/backup/gdrive/callback
      MINIO_BACKUP_BUCKETS: ${MINIO_BACKUP_BUCKETS:-}
      APP_BASE_URL: https://${HOST_PREFIX}app.${DOMAIN}
      # Google sign-in. Same-origin start + callback on the app host so the
      # state cookie survives; the URI must be registered in the Google console.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: https://${HOST_PREFIX}app.${DOMAIN}/api/auth/oauth/google/callback
      # Admin SSO gate: hosts it may mint tokens for + the app origin for login.
      SSO_SECRET: ${SSO_SECRET:-}
      SSO_ALLOWED_HOSTS: ${HOST_PREFIX}grafana.${DOMAIN},${HOST_PREFIX}minio.${DOMAIN},${HOST_PREFIX}redis.${DOMAIN},${HOST_PREFIX}prometheus.${DOMAIN},${HOST_PREFIX}cadvisor.${DOMAIN},${HOST_PREFIX}pgadmin.${DOMAIN},${HOST_PREFIX}portainer.${DOMAIN}
      SSO_APP_ORIGIN: https://${HOST_PREFIX}app.${DOMAIN}
      # Prometheus base for the admin Monitor proxy (read-only query API).
      PROMETHEUS_URL: http://prometheus:9090
    volumes:
      - backupwork:/var/backups/work
    labels:
      com.project.service: backend
      com.project.env: ${APP_ENV}
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://localhost:4000/health']
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]

  # Public SEO/landing site (Next.js standalone server). Internal only; nginx
  # proxies the apex/stage host to it.
  landing:
    image: ${REGISTRY}/trello-landing:${IMAGE_TAG}
    build:
      context: ../../..
      dockerfile: packages/infra/docker/Dockerfile.landing
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Read at RUNTIME by the force-dynamic layout (nothing baked at build).
      APP_URL: https://${HOST_PREFIX}app.${DOMAIN}
      SITE_URL: ${SITE_URL}
    labels:
      com.project.service: landing
      com.project.env: ${APP_ENV}
    networks: [internal]

  # nginx = app-internal proxy + static frontend (ONE image). Sits BEHIND
  # Traefik: listens on HTTP :80, publishes no host port, holds no cert.
  # Traefik routes every *.${DOMAIN} host here over the 'edge' network; this
  # nginx splits by server_name (app/api/landing/admin consoles + SSO gate).
  nginx:
    image: ${REGISTRY}/trello-frontend:${IMAGE_TAG}
    build:
      context: ../../..
      dockerfile: packages/infra/docker/Dockerfile.nginx
      args:
        SENTRY_RELEASE: ${SENTRY_RELEASE:-dev}
      secrets:
        - sentry_auth_token
    restart: unless-stopped
    environment:
      # Rendered into /config.js at container start (window.__ENV__) — the
      # SPA's tier arrives at RUNTIME, images stay byte-identical.
      APP_ENV: ${APP_ENV}
      DOMAIN: ${DOMAIN}
      HOST_PREFIX: ${HOST_PREFIX}
      # Where the SSO gate bounces admins to prove super-admin: the CURRENT
      # tier's app host (it holds the access_token cookie).
      SSO_SESSION_DOMAIN: ${HOST_PREFIX}app.${DOMAIN}
      # envsubst renders default.conf.template at start; FILTER restricts
      # substitution to *DOMAIN* names so nginx runtime vars ($host/$uri) stay.
      NGINX_ENVSUBST_FILTER: DOMAIN
    labels:
      com.project.service: nginx
      com.project.env: ${APP_ENV}
      traefik.enable: 'true'
      traefik.docker.network: edge
      # Match apex + every subdomain of ${DOMAIN} (incl. stage-* on stage).
      # ${DOMAIN} is substituted by compose from .env; $$ = literal '$'
      # (the regex end anchor).
      traefik.http.routers.trello.rule: 'HostRegexp(`^(.+\.)?${DOMAIN}$$`)'
      traefik.http.routers.trello.entrypoints: websecure
      traefik.http.routers.trello.tls: 'true'
      traefik.http.services.trello.loadbalancer.server.port: '80'
    depends_on: [backend, landing]
    networks:
      edge: {}
      internal:
        # Pinned so Grafana's auth-proxy whitelist can trust exactly this IP
        # (X-WEBAUTH-User must only be honored when set by THIS nginx).
        ipv4_address: 172.28.0.10

  # ---------------------------------------------------------------------------
  # Observability stack (stock images; UIs published via the SSO-gated nginx
  # subdomains, no host ports anywhere).
  # ---------------------------------------------------------------------------

  loki:
    image: grafana/loki:3.3.2
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yaml -config.expand-env=true
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - lokidata:/loki
    depends_on:
      createbuckets:
        condition: service_completed_successfully
    networks: [internal]

  tempo:
    image: grafana/tempo:2.7.0
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo-config.yaml -config.expand-env=true
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    volumes:
      - ./tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempodata:/var/tempo
    depends_on:
      createbuckets:
        condition: service_completed_successfully
    networks: [internal]

  prometheus:
    image: prom/prometheus:v3.1.0
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    # UI at the prometheus subdomain (admin SSO-gated); no native auth.
    networks: [internal]

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      # Served behind nginx at the grafana subdomain (TLS at Traefik).
      GF_SERVER_ROOT_URL: https://${HOST_PREFIX}grafana.${DOMAIN}
      GF_SERVER_DOMAIN: ${HOST_PREFIX}grafana.${DOMAIN}
      # Admin SSO: trust the X-WEBAUTH-User header, but ONLY from nginx's
      # pinned internal IP. Without the whitelist any in-network container
      # could spoof the header.
      GF_AUTH_PROXY_ENABLED: 'true'
      GF_AUTH_PROXY_HEADER_NAME: X-WEBAUTH-User
      GF_AUTH_PROXY_HEADER_PROPERTY: username
      GF_AUTH_PROXY_HEADERS: Email:X-WEBAUTH-User
      GF_AUTH_PROXY_AUTO_SIGN_UP: 'true'
      GF_AUTH_PROXY_ENABLE_LOGIN_TOKEN: 'false'
      GF_AUTH_PROXY_WHITELIST: 172.28.0.10
      GF_AUTH_PROXY_SYNC_TTL: '60'
      # Lock down to SSO only: no login form, no basic auth. Recovery = unset
      # these two + redeploy.
      GF_AUTH_DISABLE_LOGIN_FORM: 'true'
      GF_AUTH_BASIC_ENABLED: 'false'
      # SSO'd users passed the super-admin gate, so grant them Grafana Admin.
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: Admin
      # Telegram alert credentials, interpolated into alerting provisioning.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/alerting:/etc/grafana/provisioning/alerting:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - loki
      - tempo
      - prometheus
    networks: [internal]

  vector:
    image: timberio/vector:0.44.0-alpine
    restart: unless-stopped
    # Point at our config explicitly; otherwise the image runs its demo config.
    command: ['--config', '/etc/vector/vector.toml']
    environment:
      # Tier fallback for the env label on unlabeled infra containers.
      VPS_ENV: ${APP_ENV}
    volumes:
      - ./vector/vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks: [internal]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    pid: host
    volumes:
      - /:/host:ro,rslave
    command:
      - --path.rootfs=/host
    networks: [internal]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    # UI at the cadvisor subdomain (admin SSO-gated); no native auth.
    networks: [internal]

  # pgAdmin (:80). Postgres admin UI. Admin SSO-gated AND keeps its own login
  # (no header-trust mode), so reaching it still needs the pgAdmin credentials.
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@${DOMAIN}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'True'
      # Behind nginx at the pgadmin subdomain (TLS terminated upstream).
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: '1'
      PGADMIN_CONFIG_PROXY_X_PREFIX_COUNT: '1'
    volumes:
      - pgadmindata:/var/lib/pgadmin
    labels:
      com.project.service: pgadmin
      com.project.env: ${APP_ENV}
    networks: [internal]

  # Filtered Docker API for Portainer. Mounts the real socket read-only and only
  # exposes the verbs Portainer needs, so a Portainer compromise is not
  # automatic host-root. Portainer talks to this over tcp, never the raw socket.
  dockerproxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    privileged: true
    environment:
      CONTAINERS: '1'
      IMAGES: '1'
      NETWORKS: '1'
      VOLUMES: '1'
      SERVICES: '1'
      TASKS: '1'
      NODES: '1'
      INFO: '1'
      VERSION: '1'
      EVENTS: '1'
      PING: '1'
      # Leave POST/EXEC off: read-mostly management surface.
      POST: '0'
      EXEC: '0'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [internal]

  # Portainer (:9000). Docker management UI. Admin SSO-gated AND keeps its own
  # login. Admin password is preset (bcrypt) so the initial-admin window can't
  # be claimed via SSO.
  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    depends_on:
      - dockerproxy
    command: -H tcp://dockerproxy:2375 --admin-password "${PORTAINER_ADMIN_PASSWORD_HASH:-}"
    volumes:
      - portainerdata:/data
    networks: [internal]

volumes:
  pgdata:
  backupwork:
  miniodata:
  lokidata:
  tempodata:
  promdata:
  grafanadata:
  redisinsightdata:
  pgadmindata:
  portainerdata:

networks:
  # Shared Traefik network — created once per VPS (see packages/infra/DEPLOY.md).
  edge:
    external: true
  # Fixed subnet so nginx can hold a stable IP for Grafana's auth-proxy
  # whitelist. Dynamic IPs are confined to .1.0/24 so the pinned .0.10 never
  # collides with an auto-assigned address. Changing this requires
  # `docker compose down` to recreate the network.
  internal:
    ipam:
      config:
        - subnet: 172.28.0.0/16
          ip_range: 172.28.1.0/24
          gateway: 172.28.0.1

secrets:
  # Sentry org token for source-map upload at BUILD time only. Sourced from the
  # SENTRY_AUTH_TOKEN env var on the builder; mounted into the build step via
  # BuildKit, never baked into an image layer, never written to the VPS .env.
  sentry_auth_token:
    environment: SENTRY_AUTH_TOKEN
