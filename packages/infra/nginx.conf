# Extract the bare trace-id (2nd field of W3C traceparent: version-traceId-spanId-flags)
# so nginx, backend, and Tempo share ONE id. Fall back to $request_id.
map $http_traceparent $trace_id {
  "~^[0-9a-f]{2}-(?<tid>[0-9a-f]{32})-" $tid;
  default                               $request_id;
}

log_format main_json escape=json
  '{"time":"$time_iso8601","service":"nginx","level":"info",'
  '"method":"$request_method","path":"$uri","status":$status,'
  '"responseTime":$request_time,"traceId":"$trace_id","ip":"$remote_addr"}';

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  access_log /dev/stdout main_json;
  error_log /dev/stderr;

  # Shared proxy headers + trace context for the backend.
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header traceparent $http_traceparent;   # pass W3C context unchanged
  proxy_set_header X-Request-ID $trace_id;           # normalized id at the edge
  add_header X-Request-ID $trace_id always;          # return to the frontend

  # tRPC API -> backend container
  location /trpc {
    proxy_pass http://backend:4000;
  }

  # REST + /api/client-log -> backend container
  location /api {
    proxy_pass http://backend:4000;
  }

  # Browser OTLP traces -> Tempo (same-origin, so no CORS needed).
  location /otlp/ {
    proxy_pass http://tempo:4318/;
  }

  # /metrics is internal-only (leaks traffic shape + endpoint inventory).
  location /metrics {
    return 404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
