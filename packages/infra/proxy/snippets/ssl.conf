# Cloudflare Origin CA cert (Full/strict). Place the files in packages/infra/certs/
# origin.pem = origin certificate, origin.key = private key (see certs/README.md).
ssl_certificate     /etc/nginx/certs/origin.pem;
ssl_certificate_key /etc/nginx/certs/origin.key;

ssl_protocols       TLSv1.2 TLSv1.3;
ssl_ciphers         HIGH:!aNULL:!MD5;
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 1d;

# Optional hardening: Cloudflare Authenticated Origin Pulls. Uncomment after
# uploading Cloudflare's client CA to certs/cloudflare-origin-pull-ca.pem so the
# origin only accepts traffic coming from Cloudflare.
# ssl_client_certificate /etc/nginx/certs/cloudflare-origin-pull-ca.pem;
# ssl_verify_client on;
