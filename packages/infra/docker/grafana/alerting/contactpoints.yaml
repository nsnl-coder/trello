apiVersion: 1

# Telegram contact point. The bot TOKEN (the real secret) stays in env
# (packages/infra/.env -> grafana container). The chat id is a non-secret
# identifier and is hardcoded: Grafana re-types an all-digit env value as a
# number on provisioning ("cannot unmarshal number into chatid string"), so the
# env form crashes startup. Hardcoding keeps it a string and matches all tiers.
contactPoints:
  - orgId: 1
    name: telegram
    receivers:
      - uid: telegram-default
        type: telegram
        settings:
          bottoken: "${TELEGRAM_BOT_TOKEN}"
          chatid: "8207631801"
        disableResolveMessage: false
