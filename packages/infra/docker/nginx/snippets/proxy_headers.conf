# Shared upstream proxy headers + trace propagation.
proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
# Real client IP (restored by cloudflare-realip.conf) — matches the backend's
# 'trust proxy' depth of one hop.
proxy_set_header X-Forwarded-For   $remote_addr;
# Behind Traefik the nginx hop is plain HTTP, so $scheme would say "http".
# Traefik terminates TLS and sets X-Forwarded-Proto=https; pass that through so
# upstreams (Secure cookies, redirect URLs) see the real scheme.
proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
proxy_set_header traceparent       $http_traceparent;  # W3C context unchanged
proxy_set_header X-Request-ID      $trace_id;          # normalized id
add_header       X-Request-ID      $trace_id always;
