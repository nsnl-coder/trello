apiVersion: 1

# Telegram contact point. Token + chat id come from env (packages/infra/.env ->
# grafana container), never committed. Grafana interpolates ${VAR} as raw text
# BEFORE parsing YAML, so both MUST be quoted - the bot token contains ':' and
# would otherwise break YAML parsing (and mis-read chatid as a number).
contactPoints:
  - orgId: 1
    name: telegram
    receivers:
      - uid: telegram-default
        type: telegram
        settings:
          bottoken: "${TELEGRAM_BOT_TOKEN}"
          chatid: "${TELEGRAM_CHAT_ID}"
        disableResolveMessage: false
