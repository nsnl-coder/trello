# e2e runner for the dev/prod VPS. Drives the LIVE deployed site (E2E_BASE_URL)
# as a pre-seeded test user - no test DB, no MinIO, no app boot. OTP-dependent
# flows read codes from the Mailtrap sandbox (used in dev AND prod).
#
# Runs as its own compose project (deploy-scripts/run-e2e.sh: `-p trelloclone3-e2e`).
# The only thing built is this small runner; teardown removes it.
services:
  e2e:
    build:
      context: ../..
      dockerfile: packages/infra/e2e.Dockerfile
    environment:
      # Which live site to hit (set per tier by run-e2e.sh).
      E2E_BASE_URL: ${E2E_BASE_URL}
      # Destructive specs run on dev only (run-e2e.sh sets false on prod).
      E2E_ALLOW_DESTRUCTIVE: ${E2E_ALLOW_DESTRUCTIVE:-false}
      # Test-user emails are defined in code (support/users.ts); only the shared
      # password + the admin (super admin) creds come from env.
      E2E_PASSWORD: ${E2E_PASSWORD:-}
      E2E_ADMIN_EMAIL: ${E2E_ADMIN_EMAIL:-}
      E2E_ADMIN_PASSWORD: ${E2E_ADMIN_PASSWORD:-}
      # Mailtrap sandbox: read OTP emails back (dev + prod both use the sandbox).
      MAILTRAP_API_TOKEN: ${MAILTRAP_API_TOKEN:-}
      MAILTRAP_ACCOUNT_ID: ${MAILTRAP_ACCOUNT_ID:-1334917}
      MAILTRAP_INBOX_ID: ${MAILTRAP_INBOX_ID:-3716831}
