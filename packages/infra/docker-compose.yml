# run from repo root, choosing the tier on the command line:
#   dev VPS : VPS_ENV=dev  FRONTEND_BUILD=build:dev docker compose -f packages/infra/docker-compose.yml up -d --build
#   prod VPS: VPS_ENV=prod docker compose -f packages/infra/docker-compose.yml up -d --build
# Secrets come from the shell / an .env next to this file:
#   MINIO_ACCESS_KEY, MINIO_SECRET_KEY, GRAFANA_PASSWORD
services:
  db:
    image: postgres:16-alpine
    container_name: trelloclone3-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: trelloclone
    volumes:
      - pgdata:/var/lib/postgresql/data
    labels:
      com.project.service: db
      com.project.env: ${VPS_ENV:-prod}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trelloclone"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: trelloclone3-redis
    restart: unless-stopped
    labels:
      com.project.service: redis
      com.project.env: ${VPS_ENV:-prod}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # RedisInsight UI (:5540). No auth of its own -> admin-gated by the same SSO
  # forward-auth as Grafana/MinIO. Pre-accepts the EULA and auto-adds the local
  # redis connection so the UI opens straight onto our instance.
  redisinsight:
    image: redis/redisinsight:latest
    container_name: trelloclone3-redisinsight
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      RI_APP_HOST: 0.0.0.0
      RI_APP_PORT: "5540"
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: "6379"
      RI_REDIS_ALIAS: trelloclone
    volumes:
      - redisinsightdata:/data
    expose:
      - "5540"
    labels:
      com.project.service: redisinsight
      com.project.env: ${VPS_ENV:-prod}

  minio:
    image: minio/minio:latest
    container_name: trelloclone3-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      # Console served behind the proxy at the minio subdomain (TLS upstream).
      MINIO_BROWSER_REDIRECT_URL: https://${MINIO_DOMAIN:-dev-minio.trello-clone.shop}
    volumes:
      - miniodata:/data
    labels:
      com.project.service: minio
      com.project.env: ${VPS_ENV:-prod}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: create the Loki + Tempo buckets, then exit.
  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set m http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb -p m/loki-data m/tempo-data; exit 0"

  backend:
    build:
      context: ../..
      dockerfile: packages/infra/backend.Dockerfile
      args:
        SENTRY_RELEASE: ${SENTRY_RELEASE:-dev}
      secrets:
        - sentry_auth_token
    container_name: trelloclone3-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: ../backend/.env
        required: true
    environment:
      # VPS_ENV is the only tier knob; NODE_ENV is derived from it in tracing.ts.
      - VPS_ENV=${VPS_ENV:-prod}
      - PORT=4000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=http://minio:9000
      - SENTRY_RELEASE=${SENTRY_RELEASE:-dev}
      # Frontend lives on a different subdomain than the API -> credentialed CORS.
      # Prod must override (comma-separated origins) in packages/infra/.env.
      - CORS_ORIGINS=${CORS_ORIGINS:-https://dev-app.trello-clone.shop}
      # Admin SSO gate: hosts it may mint tokens for + the app origin for login.
      # SSO_SECRET is omitted on purpose -> backend falls back to JWT_ACCESS_SECRET.
      - SSO_ALLOWED_HOSTS=${GRAFANA_DOMAIN:-dev-grafana.trello-clone.shop},${MINIO_DOMAIN:-dev-minio.trello-clone.shop},${REDIS_DOMAIN:-dev-redis.trello-clone.shop}
      - SSO_APP_ORIGIN=https://${APP_DOMAIN:-dev-app.trello-clone.shop}
      # Backup: staging dir + MinIO creds for `mc` mirror. GDRIVE_*, APP_BASE_URL,
      # and BACKUP_ENCRYPTION_PASSPHRASE come from backend/.env (env_file).
      - BACKUP_WORK_DIR=/var/backups/work
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BACKUP_BUCKETS=${MINIO_BACKUP_BUCKETS:-}
    volumes:
      - backupwork:/var/backups/work
    expose:
      - "4000"
      - "9464" # OTel Prometheus metrics
    labels:
      com.project.service: backend
      com.project.env: ${VPS_ENV:-prod}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ../..
      dockerfile: packages/infra/frontend.Dockerfile
      args:
        # dev vps: override with build:dev
        FRONTEND_BUILD: ${FRONTEND_BUILD:-build}
        SENTRY_RELEASE: ${SENTRY_RELEASE:-dev}
      secrets:
        - sentry_auth_token
    container_name: trelloclone3-web
    restart: unless-stopped
    depends_on:
      - backend
    # No host port: reached only via the proxy on the internal network.
    expose:
      - "80"
    labels:
      com.project.service: frontend
      com.project.env: ${VPS_ENV:-prod}

  # Public SEO/landing site (Next.js, node server). Internal only; via proxy.
  landing:
    build:
      context: ../..
      dockerfile: packages/infra/landing.Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://dev-app.trello-clone.shop}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://dev.trello-clone.shop}
    container_name: trelloclone3-landing
    restart: unless-stopped
    expose:
      - "3000"
    labels:
      com.project.service: landing
      com.project.env: ${VPS_ENV:-prod}

  # Edge reverse proxy + TLS terminator. The ONLY service publishing host ports
  # (80/443). Cloudflare fronts it; it serves a Cloudflare Origin CA cert.
  proxy:
    image: nginx:1.27-alpine
    container_name: trelloclone3-proxy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - landing
      - grafana
      - minio
      - redisinsight
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Per-tier domains; override in packages/infra/.env for prod.
      APP_DOMAIN: ${APP_DOMAIN:-dev-app.trello-clone.shop}
      API_DOMAIN: ${API_DOMAIN:-dev-api.trello-clone.shop}
      LANDING_DOMAIN: ${LANDING_DOMAIN:-dev.trello-clone.shop}
      GRAFANA_DOMAIN: ${GRAFANA_DOMAIN:-dev-grafana.trello-clone.shop}
      MINIO_DOMAIN: ${MINIO_DOMAIN:-dev-minio.trello-clone.shop}
      REDIS_DOMAIN: ${REDIS_DOMAIN:-dev-redis.trello-clone.shop}
      # Only substitute *DOMAIN* vars; leave $host, $remote_addr, etc. intact.
      NGINX_ENVSUBST_FILTER: DOMAIN
    volumes:
      - ./proxy/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./proxy/snippets:/etc/nginx/snippets:ro
      - ./certs:/etc/nginx/certs:ro
    labels:
      com.project.service: proxy
      com.project.env: ${VPS_ENV:-prod}
    networks:
      default:
        # Pinned so Grafana's auth-proxy whitelist can trust exactly this IP.
        ipv4_address: 172.28.0.10

  loki:
    image: grafana/loki:3.3.2
    container_name: trelloclone3-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yaml -config.expand-env=true
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - lokidata:/loki
    depends_on:
      createbuckets:
        condition: service_completed_successfully

  tempo:
    image: grafana/tempo:2.7.0
    container_name: trelloclone3-tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo-config.yaml -config.expand-env=true
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - ./tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempodata:/var/tempo
    depends_on:
      createbuckets:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: trelloclone3-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d

  grafana:
    image: grafana/grafana:11.4.0
    container_name: trelloclone3-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      # Served behind the proxy at the monitor subdomain (TLS terminated upstream).
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN:-dev-grafana.trello-clone.shop}
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-dev-grafana.trello-clone.shop}
      # Admin SSO: trust the X-WEBAUTH-User header, but ONLY from the proxy's
      # pinned IP (172.28.0.10). Without the whitelist any in-network container
      # could spoof the header. Login form stays available as a fallback.
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: X-WEBAUTH-User
      GF_AUTH_PROXY_HEADER_PROPERTY: username
      GF_AUTH_PROXY_HEADERS: Email:X-WEBAUTH-User
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_AUTH_PROXY_ENABLE_LOGIN_TOKEN: "false"
      GF_AUTH_PROXY_WHITELIST: 172.28.0.10
      GF_AUTH_PROXY_SYNC_TTL: "60"
      # SSO'd users pass the super-admin gate, so grant them Grafana Admin.
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: Admin
      # Telegram alert credentials, interpolated into alerting provisioning.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/alerting:/etc/grafana/provisioning/alerting:ro
      - grafanadata:/var/lib/grafana
    # Loopback-only: not publicly exposed. Reach via SSH tunnel:
    #   ssh -L 3000:127.0.0.1:3000 trello-dev-vps  -> http://localhost:3000
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - loki
      - tempo
      - prometheus

  vector:
    image: timberio/vector:0.44.0-alpine
    container_name: trelloclone3-vector
    restart: unless-stopped
    # Point at our config explicitly; otherwise the image runs its demo config.
    command: ["--config", "/etc/vector/vector.toml"]
    environment:
      # Tier fallback for the env label on unlabeled infra containers.
      - VPS_ENV=${VPS_ENV:-prod}
    volumes:
      - ./vector/vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: trelloclone3-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /:/host:ro,rslave
    command:
      - --path.rootfs=/host

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: trelloclone3-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

networks:
  # Fixed subnet so the proxy can hold a stable IP for Grafana's auth-proxy
  # whitelist. Dynamic IPs are confined to .1.0/24 so the proxy's static .0.10
  # never collides with an auto-assigned address. Changing this requires
  # `docker compose down` to recreate the network.
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/16
          ip_range: 172.28.1.0/24
          gateway: 172.28.0.1

volumes:
  pgdata:
  backupwork:
  miniodata:
  lokidata:
  tempodata:
  promdata:
  grafanadata:
  redisinsightdata:

secrets:
  # Sentry org token for source-map upload at build time. Sourced from the
  # SENTRY_AUTH_TOKEN env var (set in packages/infra/.env); mounted only into the
  # build step via BuildKit, never baked into an image layer.
  sentry_auth_token:
    environment: SENTRY_AUTH_TOKEN
