# Shared upstream proxy headers + trace propagation.
proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;     # always https at the edge
proxy_set_header traceparent       $http_traceparent;  # W3C context unchanged
proxy_set_header X-Request-ID      $trace_id;          # normalized id
add_header       X-Request-ID      $trace_id always;
