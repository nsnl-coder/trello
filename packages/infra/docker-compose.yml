# run from repo root:
#   docker compose -f packages/infra/docker-compose.yml up -d --build
services:
  db:
    image: postgres:16-alpine
    container_name: trelloclone3-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: trelloclone
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trelloclone"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../..
      dockerfile: packages/infra/backend.Dockerfile
    container_name: trelloclone3-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: ../backend/.env.prod
        required: true
    environment:
      - NODE_ENV=production
      - PORT=4000
    expose:
      - "4000"

  frontend:
    build:
      context: ../..
      dockerfile: packages/infra/frontend.Dockerfile
      args:
        # dev vps: override with build:dev
        FRONTEND_BUILD: ${FRONTEND_BUILD:-build}
    container_name: trelloclone3-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
